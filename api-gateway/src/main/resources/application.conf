ktor {
  deployment {
    port = 8088
    port = ${?PORT}
  }
  application {
    modules = [com.example.ApplicationKt.module]
  }
}

# JWT配置(与认证服务保持一致)
jwt {
  domain = "https://jwt-provider-domain/"
  audience = "jwt-audience"
  realm = "ktor sample app"
  # 如果环境变量未设置，使用默认值（仅用于开发）
  secret = "your-super-secret-key-must-be-at-least-256-bits-long-for-hs512-algorithm"
  secret = ${?JWT_SECRET}
  expiration = 86400
  issuer = "med-collab-system"
}

# 后端服务配置
services {
  auth {
    baseUrl = "http://localhost:8081"
    baseUrl = ${?AUTH_SERVICE_URL}
    pathPrefix = "/api/auth"
  }
  patient {
    baseUrl = "http://localhost:8082"
    baseUrl = ${?PATIENT_SERVICE_URL}
    pathPrefix = "/patients"
  }
  metric {
    baseUrl = "http://localhost:8083"
    baseUrl = ${?METRIC_SERVICE_URL}
    pathPrefix = "/metric"
  }
  report {
    baseUrl = "http://localhost:8084"
    baseUrl = ${?REPORT_SERVICE_URL}
    pathPrefix = "/report"
  }
}
