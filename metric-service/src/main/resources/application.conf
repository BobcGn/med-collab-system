ktor {
  deployment {
    port = 8083
    port = ${?PORT}
  }
  application {
    modules = [com.example.ApplicationKt.module]
  }
}
jwt {
  domain = "https://jwt-provider-domain/"
  audience = "jwt-audience"
  realm = "ktor sample app"
  secret = "your-super-secret-key-must-be-at-least-256-bits-long-for-hs512-algorithm"
  expiration = 86400
  issuer = "med-collab-system"
}
database {
  mysql {
    url = "jdbc:h2:file:./.data/metric-service;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1"
    url = ${?METRIC_DATABASE_URL}
    user = "sa"
    user = ${?METRIC_DATABASE_USER}
    password = ""
    password = ${?METRIC_DATABASE_PASSWORD}
    driver = "org.h2.Driver"
    driver = ${?METRIC_DATABASE_DRIVER}
  }
}
deepseek {
  apiKey = ${?DEEPSEEK_API_KEY}
}
