# ============================================================================
# Gitleaks Configuration
# 来源: skill-central / codeql-security-scanner § 硬编码敏感信息检测
# ============================================================================

title: "med-collab-system Gitleaks Config"

# 允许一些已知的测试/示例模式 (需审查确认)
allowlist:
  description: "Known safe patterns — review periodically"
  paths:
    - "**/test/**"
    - "**/tests/**"
    - "**/*.test.*"
    - "**/*.spec.*"
  regexes:
    - "ANTHROPIC_AUTH_TOKEN=sk-.*"  # 仅允许在 .env.example 中
  paths-allowed:
    - ".env.example"
    - "*.sample"

[rules]
  # 通用密钥模式
  - id: "generic-api-key"
    description: "Generic API key"
    regex: '''(?i)(api[_-]?key|apikey|secret|token|password|passwd|auth)\s*[:=]\s*[''"][0-9a-zA-Z\-_=]{20,}[''"]'''
    tags: ["key", "secret"]

  # JWT Secret
  - id: "jwt-secret"
    description: "Hardcoded JWT secret"
    regex: '''(?i)(jwt[_-]?secret|jwt[_-]?key)\s*[:=]\s*[''"][0-9a-zA-Z\-_=]{8,}[''"]'''
    tags: ["jwt", "secret"]

  # 内网地址
  - id: "private-ip"
    description: "Hardcoded private IP address"
    regex: '''\b(10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3})\b'''
    tags: ["network", "internal"]
    [rules.allowlist]
      description: "Allow in Docker Compose and local config"
      paths:
        - "docker-compose*.yml"
        - "*.conf"
        - "*.properties"

  # 数据库连接字符串
  - id: "db-connection-string"
    description: "Database connection string with credentials"
    regex: '''(?i)(jdbc|mongodb|mysql|postgresql)://[^/\s]+:[^/\s]+@'''
    tags: ["database", "credentials"]

  # 私钥
  - id: "private-key"
    description: "Private key"
    regex: '''-----BEGIN\s?(RSA|EC|DSA|OPENSSH)?\s?PRIVATE\s?KEY-----'''
    tags: ["key", "crypto"]

  # AWS 凭证
  - id: "aws-credentials"
    description: "AWS access keys"
    regex: '''(?i)(aws[_-]?(access[_-]?key[_-]?id|secret[_-]?access[_-]?key)|AKIA[0-9A-Z]{16})'''
    tags: ["aws", "credentials"]
